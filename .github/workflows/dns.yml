name: Ensure DNS

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DNS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upsert CNAME palette.gontrum.io → gontrum.github.io
        run: |
          aws route53 change-resource-record-sets \
            --hosted-zone-id ${{ vars.HOSTED_ZONE_ID }} \
            --change-batch '{
              "Changes": [{
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "palette.gontrum.io",
                  "Type": "CNAME",
                  "TTL": 3600,
                  "ResourceRecords": [{"Value": "gontrum.github.io"}]
                }
              }]
            }'
